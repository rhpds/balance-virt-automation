{{ if .Values.deschedulerOperator.enabled -}}
{{- range $dest := .Values.deschedulerOperator.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler-operator{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ $.Values.deschedulerOperator.git.repoURL }}
    targetRevision: {{ $.Values.deschedulerOperator.git.targetRevision }}
    path: {{ $.Values.deschedulerOperator.git.path }}
  destination:
    name: {{ $dest }}
    namespace: openshift-kube-descheduler-operator
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    managedNamespaceMetadata:
      labels:
        openshift.io/cluster-monitoring: "true"
{{- end }}
{{- end }}
