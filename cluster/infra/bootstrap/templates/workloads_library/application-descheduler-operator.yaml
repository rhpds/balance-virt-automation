{{ if .Values.deschedulerOperator.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler-operator
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ .Values.deschedulerOperator.git.repoURL }}
    targetRevision: {{ .Values.deschedulerOperator.git.targetRevision }}
    path: {{ .Values.deschedulerOperator.git.path }}
    helm:
      values: |
        namespace: openshift-operators
        operator:
          startingCSV: {{ .Values.deschedulerOperator.operator.startingCSV }}
          installPlanApproval: Manual
        helper-status-checker:
          enabled: true
          approver: true
          checks:
            - operatorName: cluster-kube-descheduler-operator
              namespace:
                name: openshift-kube-descheduler-operator
              syncwave: '0'
              serviceAccount:
                name: "descheduler-status-checker"
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-kube-descheduler-operator
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
