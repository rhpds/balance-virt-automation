{{ if .Values.defaultStorageclass.enabled -}}
{{- range $dest := .Values.defaultStorageclass.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: default-storageclass{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ $.Values.defaultStorageclass.git.repoURL }}
    targetRevision: {{ $.Values.defaultStorageclass.git.targetRevision }}
    path: {{ $.Values.defaultStorageclass.git.path }}
  destination:
    name: {{ $dest }}
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
