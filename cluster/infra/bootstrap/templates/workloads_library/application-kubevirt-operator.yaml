{{ if .Values.kubevirtOperator.enabled -}}
{{- range $dest := .Values.kubevirtOperator.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt-operator{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ $.Values.kubevirtOperator.git.repoURL }}
    targetRevision: {{ $.Values.kubevirtOperator.git.targetRevision }}
    path: {{ $.Values.kubevirtOperator.git.path }}
    helm:
      values: |
        kubevirt:
          decentralizedLiveMigration: {{ $.Values.kubevirtOperator.decentralizedLiveMigration | default false }}
          liveMigrationNetwork: {{ $.Values.kubevirtOperator.liveMigrationNetwork | default "" | quote }}
  destination:
    name: {{ $dest }}
    namespace: openshift-cnv
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: "hco.kubevirt.io"
    kind: "HyperConverged"
    jsonPointers:
    - /spec/enableCommonBootImageImport
    - /spec/higherWorkloadDensity
{{- end }}
{{- end }}
