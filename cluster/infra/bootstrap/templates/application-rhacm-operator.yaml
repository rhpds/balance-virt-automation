{{ if .Values.rhacmOperator.enabled -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhacm-operator
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: {{ .Values.rhacmOperator.git.repoURL }}
    targetRevision: {{ .Values.rhacmOperator.git.targetRevision }}
    path: {{ .Values.rhacmOperator.git.path }}
    helm:
      values: |
        deployer:
          domain: {{ .Values.deployer.domain }}
          apiUrl: {{ .Values.deployer.apiUrl }}
  destination:
    server: https://kubernetes.default.svc
    namespace: open-cluster-management
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
{{- end }}
