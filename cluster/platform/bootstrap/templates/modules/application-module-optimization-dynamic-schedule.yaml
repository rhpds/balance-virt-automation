{{- if .Values.moduleOptimizationDynamicSchedule.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-optimization-dynamic-schedule
  namespace: openshift-gitops
  labels:
    demo.redhat.com/application: ""
spec:
  project: default
  source:
    repoURL: {{ .Values.moduleOptimizationDynamicSchedule.git.repoURL }}
    targetRevision: {{ .Values.moduleOptimizationDynamicSchedule.git.targetRevision }}
    path: {{ .Values.moduleOptimizationDynamicSchedule.git.path }}
  destination:
    server: https://kubernetes.default.svc
    namespace: dynamic-schedule
  syncPolicy:
    automated:
      enabled: {{ .Values.syncPolicy.automated.enabled }}
    retry:
      limit: 10
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: "apps"
      kind: "Deployment"
      jsonPointers:
        - /spec/replicas
        - /spec/template/spec/nodeSelector
{{- end }}
