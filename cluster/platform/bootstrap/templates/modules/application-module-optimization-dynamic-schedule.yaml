{{- if .Values.moduleOptimizationDynamicSchedule.enabled }}
{{- range $dest := .Values.moduleOptimizationDynamicSchedule.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-optimization-dynamic-schedule{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
  labels:
    demo.redhat.com/application: ""
spec:
  project: default
  source:
    repoURL: {{ $.Values.moduleOptimizationDynamicSchedule.git.repoURL }}
    targetRevision: {{ $.Values.moduleOptimizationDynamicSchedule.git.targetRevision }}
    path: {{ $.Values.moduleOptimizationDynamicSchedule.git.path }}
  destination:
    name: {{ $dest }}
    namespace: dynamic-schedule
  syncPolicy:
    automated:
      enabled: {{ $.Values.syncPolicy.automated.enabled }}
    retry:
      limit: 10
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: "apps"
      kind: "Deployment"
      jsonPointers:
        - /spec/replicas
        - /spec/template/spec/nodeSelector
{{- end }}
{{- end }}
