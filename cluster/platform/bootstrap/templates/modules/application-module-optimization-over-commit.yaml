{{- if .Values.moduleOptimizationOverCommit.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-optimization-over-commit
  namespace: openshift-gitops
  labels:
    demo.redhat.com/application: ""
spec:
  project: default
  source:
    repoURL: {{ .Values.moduleOptimizationOverCommit.git.repoURL }}
    targetRevision: {{ .Values.moduleOptimizationOverCommit.git.targetRevision }}
    path: {{ .Values.moduleOptimizationOverCommit.git.path }}
  destination:
    server: https://kubernetes.default.svc
    namespace: over-commit
  syncPolicy:
    automated:
      enabled: {{ .Values.syncPolicy.automated.enabled }}
    retry:
      limit: 10
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
{{- end }}
