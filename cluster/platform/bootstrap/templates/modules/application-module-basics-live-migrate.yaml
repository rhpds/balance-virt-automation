{{- if .Values.moduleBasicsLiveMigrate.enabled }}
{{- range $dest := .Values.moduleBasicsLiveMigrate.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-basics-live-migrate{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
  labels:
    demo.redhat.com/application: ""
spec:
  project: default
  source:
    repoURL: {{ $.Values.moduleBasicsLiveMigrate.git.repoURL }}
    targetRevision: {{ $.Values.moduleBasicsLiveMigrate.git.targetRevision }}
    path: {{ $.Values.moduleBasicsLiveMigrate.git.path }}
  destination:
    name: {{ $dest }}
    namespace: live-migrate
  syncPolicy:
    automated:
      enabled: {{ $.Values.syncPolicy.automated.enabled }}
    retry:
      limit: 10
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    managedNamespaceMetadata:
      labels:
        openshift.io/cluster-monitoring: "true"
{{- end }}
{{- end }}
