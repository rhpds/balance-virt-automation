{{- if .Values.moduleDecentralizedLiveMigrate.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-decentralized-live-migrate
  namespace: openshift-gitops
  labels:
    demo.redhat.com/application: ""
spec:
  project: default
  source:
    repoURL: {{ .Values.moduleDecentralizedLiveMigrate.git.repoURL }}
    targetRevision: {{ .Values.moduleDecentralizedLiveMigrate.git.targetRevision }}
    path: {{ .Values.moduleDecentralizedLiveMigrate.git.path }}
  destination:
    server: https://kubernetes.default.svc
    namespace: vm-live-migration-source
  syncPolicy:
    automated:
      enabled: {{ .Values.syncPolicy.automated.enabled }}
    retry:
      limit: 10
    syncOptions:
      - SkipDryRunOnMissingResource=true
    managedNamespaceMetadata:
      labels:
        openshift.io/cluster-monitoring: "true"
{{- end }}
