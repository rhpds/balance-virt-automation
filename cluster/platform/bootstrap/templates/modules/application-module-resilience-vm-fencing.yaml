{{- if .Values.moduleResilienceVmFencing.enabled }}
{{- range $dest := .Values.moduleResilienceVmFencing.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-resilience-vm-fencing{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
  labels:
    demo.redhat.com/application: ""
spec:
  project: default
  source:
    repoURL: {{ $.Values.moduleResilienceVmFencing.git.repoURL }}
    targetRevision: {{ $.Values.moduleResilienceVmFencing.git.targetRevision }}
    path: {{ $.Values.moduleResilienceVmFencing.git.path }}
  destination:
    name: {{ $dest }}
    namespace: fencing
  syncPolicy:
    automated:
      enabled: {{ $.Values.syncPolicy.automated.enabled }}
    retry:
      limit: 10
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    managedNamespaceMetadata:
      labels:
        openshift.io/cluster-monitoring: "true"
{{- end }}
{{- end }}
