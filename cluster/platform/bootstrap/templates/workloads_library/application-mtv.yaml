{{ if .Values.mtv.enabled -}}
{{- range $dest := .Values.mtv.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mtv{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ $.Values.mtv.git.repoURL }}
    targetRevision: {{ $.Values.mtv.git.targetRevision }}
    path: {{ $.Values.mtv.git.path }}
  destination:
    name: {{ $dest }}
    namespace: openshift-mtv
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: forklift.konveyor.io
      kind: ForkliftController
      jsonPointers:
        - /spec/controller_container_limits_memory
{{- end }}
{{- end }}
