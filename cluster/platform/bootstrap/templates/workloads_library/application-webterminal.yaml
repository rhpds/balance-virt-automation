{{ if .Values.webterminal.enabled -}}
{{- range $dest := .Values.webterminal.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webterminal{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ $.Values.webterminal.git.repoURL }}
    targetRevision: {{ $.Values.webterminal.git.targetRevision }}
    path: {{ $.Values.webterminal.git.path }}
    helm:
      values: |
        operator:
          {{- if $.Values.webterminal.startingCSV }}
          startingCSV: {{ $.Values.webterminal.startingCSV }}
          {{- end }}
          installPlanApproval: Automatic
  destination:
    name: {{ $dest }}
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
