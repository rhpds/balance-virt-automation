{{ if .Values.descheduler.enabled -}}
{{- range $dest := .Values.descheduler.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ $.Values.descheduler.git.repoURL }}
    targetRevision: {{ $.Values.descheduler.git.targetRevision }}
    path: {{ $.Values.descheduler.git.path }}
  destination:
    name: {{ $dest }}
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        openshift.io/cluster-monitoring: "true"
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: "operator.openshift.io"
      kind: "KubeDescheduler"
      jsonPointers:
        - /spec/mode
        - /spec/deschedulingIntervalSeconds
{{- end }}
{{- end }}
