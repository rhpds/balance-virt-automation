apiVersion: v1
kind: ServiceAccount
metadata:
  name: htpasswd-auth-setup
  namespace: openshift-config
  annotations:
    argkubectld.argoproj.io/sync-wave: "-50"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: htpasswd-auth-setup
  annotations:
    argkubectld.argoproj.io/sync-wave: "-50"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: htpasswd-auth-setup
  namespace: openshift-config
---
apiVersion: batch/v1
kind: Job
metadata:
  name: htpasswd-auth-setup
  namespace: openshift-config
  annotations:
    argkubectld.argoproj.io/sync-wave: "-50"
    argkubectld.argoproj.io/hook: Sync
    argkubectld.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: htpasswd-auth-setup
      restartPolicy: Never
      volumes:
      - name: htpasswd
        emptyDir: {}
      initContainers:
      - name: generate-htpasswd
        image: httpd:2
        env:
        - name: ADMIN_PASSWORD
          value: {{ .Values.adminPassword | quote }}
        volumeMounts:
        - name: htpasswd
          mountPath: /tmp/htpasswd
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          htpasswd -cbB /tmp/htpasswd/htpasswd admin "${ADMIN_PASSWORD}"
          echo "Generated htpasswd file:"
          cat /tmp/htpasswd/htpasswd
      containers:
      - name: setup
        image: registry.redhat.io/openshift4/ose-cli:latest
        volumeMounts:
        - name: htpasswd
          mountPath: /tmp/htpasswd
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          SECRET_NAME="htpasswd-secret"

          echo "Creating/updating htpasswd secret..."
          kubectl create secret generic "$SECRET_NAME" \
            --from-file=htpasswd=/tmp/htpasswd/htpasswd \
            -n openshift-config \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Configuring OAuth identity provider..."
          kubectl apply -f - <<'EOF'
          apiVersion: config.openshift.io/v1
          kind: OAuth
          metadata:
            name: cluster
          spec:
            identityProviders:
            - name: htpasswd
              mappingMethod: claim
              type: HTPasswd
              htpasswd:
                fileData:
                  name: htpasswd-secret
          EOF

          echo "Creating cluster-admin ClusterRoleBinding for admin user..."
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: htpasswd-admin-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: User
            name: admin
          EOF

          echo "Done. htpasswd auth configured with admin user."