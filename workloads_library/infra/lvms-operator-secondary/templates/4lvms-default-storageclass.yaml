apiVersion: v1
kind: ServiceAccount
metadata:
  name: lvms-default-storageclass
  namespace: openshift-storage
  annotations:
    argkubectld.argoproj.io/sync-wave: "-40"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lvms-default-storageclass
  annotations:
    argkubectld.argoproj.io/sync-wave: "-40"
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lvms-default-storageclass
  annotations:
    argkubectld.argoproj.io/sync-wave: "-40"
subjects:
  - kind: ServiceAccount
    name: lvms-default-storageclass
    namespace: openshift-storage
roleRef:
  kind: ClusterRole
  name: lvms-default-storageclass
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: lvms-default-storageclass
  namespace: openshift-storage
  annotations:
    argkubectld.argoproj.io/sync-wave: "-40"
spec:
  backoffLimit: 30
  template:
    spec:
      serviceAccountName: lvms-default-storageclass
      restartPolicy: Never
      containers:
        - name: set-default
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              SC_NAME="lvms-vg1"

              echo "Waiting for StorageClass '${SC_NAME}' to be created by LVMS..."
              RETRIES=0
              until kubectl get storageclass "${SC_NAME}" &>/dev/null; do
                RETRIES=$((RETRIES + 1))
                if [ $RETRIES -ge 60 ]; then
                  echo "ERROR: StorageClass '${SC_NAME}' not found after 5 minutes."
                  exit 1
                fi
                sleep 5
              done
              echo "StorageClass '${SC_NAME}' found."

              echo "Removing default annotation from any existing default StorageClass..."
              DEFAULTS=$(kubectl get storageclass \
                -o jsonpath='{range .items[?(@.metadata.annotations.storageclass\.kubernetes\.io/is-default-class=="true")]}{.metadata.name}{"\n"}{end}')
              for SC in $DEFAULTS; do
                if [ "$SC" != "${SC_NAME}" ]; then
                  echo "  Removing default from: $SC"
                  kubectl patch storageclass "$SC" \
                    -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
                fi
              done

              echo "Setting '${SC_NAME}' as the default StorageClass..."
              kubectl patch storageclass "${SC_NAME}" \
                -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

              echo "Setting '${SC_NAME}' as the default StorageClass for OpenShift Virtualization..."
              kubectl patch storageclass "${SC_NAME}" \
                -p '{"metadata":{"annotations":{"storageclass.kubevirt.io/is-default-virt-class":"true"}}}'

              echo "Done. '${SC_NAME}' is now the default StorageClass for OpenShift and Virtualization."
