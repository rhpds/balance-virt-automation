apiVersion: v1
kind: ServiceAccount
metadata:
  name: lvms-discover-devices
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-46"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lvms-discover-devices
  annotations:
    argocd.argoproj.io/sync-wave: "-46"
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["privileged"]
    verbs: ["use"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lvms-discover-devices
  annotations:
    argocd.argoproj.io/sync-wave: "-46"
subjects:
  - kind: ServiceAccount
    name: lvms-discover-devices
    namespace: openshift-storage
roleRef:
  kind: ClusterRole
  name: lvms-discover-devices
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: lvms-discover-devices
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-46"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: lvms-discover-devices
      restartPolicy: Never
      hostPID: false
      containers:
        - name: discover
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "============================================"
              echo "  LVMS Available Block Device Discovery"
              echo "============================================"

              NODES=$(oc get nodes -l node-role.kubernetes.io/worker -o jsonpath='{.items[*].metadata.name}')
              if [ -z "$NODES" ]; then
                echo "No worker nodes found."
                exit 1
              fi

              for NODE in $NODES; do
                echo ""
                echo "--- Node: $NODE ---"

                POD_NAME="lvms-discover-${NODE%%.*}"
                POD_NAME="${POD_NAME:0:63}"

                cat <<PODEOF | oc apply -f -
              apiVersion: v1
              kind: Pod
              metadata:
                name: ${POD_NAME}
                namespace: openshift-storage
                labels:
                  app: lvms-discover
              spec:
                nodeName: ${NODE}
                serviceAccountName: lvms-discover-devices
                restartPolicy: Never
                hostPID: false
                containers:
                - name: discover
                  image: registry.redhat.io/rhel9/rhel-minimal:latest
                  securityContext:
                    privileged: true
                  command:
                  - /bin/bash
                  - -c
                  - |
                    echo "Available block devices (unmounted, no partitions, no holders):"
                    echo "TYPE    SIZE     PATH"
                    echo "----    ----     ----"
                    lsblk -dpno NAME,TYPE,SIZE,MOUNTPOINT | while read -r NAME TYPE SIZE MOUNT; do
                      # Skip if mounted
                      [ -n "\$MOUNT" ] && continue
                      # Skip non-disk types
                      [ "\$TYPE" != "disk" ] && continue
                      # Skip if device has partitions or holders
                      BASENAME=\$(basename "\$NAME")
                      HOLDERS=\$(ls /sys/block/\$BASENAME/holders/ 2>/dev/null)
                      [ -n "\$HOLDERS" ] && continue
                      PARTS=\$(ls /sys/block/\$BASENAME/*/partition 2>/dev/null)
                      [ -n "\$PARTS" ] && continue
                      echo "\$TYPE    \$SIZE    \$NAME"
                    done
              PODEOF

                echo "Waiting for discovery pod on ${NODE}..."
                oc wait --for=condition=Ready pod/${POD_NAME} -n openshift-storage --timeout=60s 2>/dev/null || true
                sleep 5
                oc wait --for=jsonpath='{.status.phase}'=Succeeded pod/${POD_NAME} -n openshift-storage --timeout=120s 2>/dev/null || true

                echo ""
                oc logs ${POD_NAME} -n openshift-storage 2>/dev/null || echo "(could not retrieve logs)"

                oc delete pod ${POD_NAME} -n openshift-storage --ignore-not-found=true 2>/dev/null || true
              done

              echo ""
              echo "============================================"
              echo "  Discovery complete."
              echo "  LVMS will auto-discover and use all"
              echo "  available devices listed above."
              echo "============================================"
